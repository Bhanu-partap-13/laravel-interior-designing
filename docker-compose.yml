services:
  app:
    build: .
    ports:
      - "10000:10000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: interior_db
      DB_USERNAME: root
      DB_PASSWORD: bhanu123
    depends_on:
      - db
    volumes:
      - ./storage:/var/www/html/storage

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: bhanu123
      MYSQL_DATABASE: interior_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: